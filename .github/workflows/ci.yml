name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0
      - name: Install dependencies
        run: uv sync
      - name: Install platform dbt packages
        # dbt_utils is required by the metricflow_time_spine macro.
        # dbt_packages/ is gitignored; install before tests run.
        run: uv run dbt deps --project-dir platform
      - name: Lint
        run: uv run ruff check . && uv run ruff format --check .
      - name: Verify fixture SHA
        run: sha256sum -c tests/fixtures/FIXTURE_SHA
      - name: Test
        run: uv run pytest -v
        # check-semantic-drift requires the credit-data-platform repo to be present.
        # It is not available in CI (external repo, not a submodule).
        # Run it locally with: make check-semantic-drift

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv sync
      - name: bandit (Python SAST)
        run: uv run bandit -r src -c pyproject.toml
      - name: pip-audit (dependency CVEs)
        run: uv run pip-audit
      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
