# Eval question set — Phase 4
# Version: 1
#
# Schema:
#   id: unique question identifier (string)
#   question: natural-language question posed to GuardedAnalyst
#   category: one of:
#     - in_scope_answered   : the analyst must return AnalystAnswer
#     - out_of_scope_refused: the analyst must return RefusalResponse (scope check)
#   expected_metric: the governed metric the planner should choose (in_scope_answered only)
#   expected_dimensions: list of dimension names (may be empty) (in_scope_answered only)
#   mock_plan: the plan_query tool_input the MockLLMClient returns for this question
#              (used for deterministic CI eval; ignored for out_of_scope_refused questions
#               because those never reach the planner)
#
# Scoring rules (see src/llm_analyst/evals/scorer.py):
#   in_scope_answered  : PASS when result is AnalystAnswer AND
#                        AnalystAnswer.query_plan.metric == expected_metric
#   out_of_scope_refused: PASS when result is RefusalResponse
#
# Coverage: 7 governed metrics × 2 phrasings each (14 in-scope)
#           + 8 out-of-scope/PII/SQL questions (8 refused)
# Total: 22 questions.

version: 1

questions:

  # ── Origination volume ──────────────────────────────────────────────────────

  - id: ev_origination_01
    question: "What is the total origination volume by product type?"
    category: in_scope_answered
    expected_metric: origination_volume
    expected_dimensions: ["loan__product"]
    mock_plan:
      metric: origination_volume
      dimensions: ["loan__product"]
      filters: []
      time_grain: null
      rationale: "origination_volume measures the total principal originated, broken down by product."

  - id: ev_origination_02
    question: "How much principal has been originated across the whole portfolio?"
    category: in_scope_answered
    expected_metric: origination_volume
    expected_dimensions: []
    mock_plan:
      metric: origination_volume
      dimensions: []
      filters: []
      time_grain: null
      rationale: "origination_volume gives the total principal originated across all loans."

